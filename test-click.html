<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
.btn{display:block;width:100%;padding:16px;margin:10px 0;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.btn:active{background:#1557b0}
.result{margin-top:20px;padding:16px;background:#fff;border-radius:8px;min-height:60px;font-size:14px;color:#666}
.green{color:#0a0}
</style>
</head>
<body>
<h2>点击测试</h2>
<p style="color:#888;margin:8px 0">如果下面按钮点了有反应，说明浏览器正常；如果没反应，说明文件没有以正确方式打开。</p>
<button class="btn" id="btn1" onclick="show('onclick内联成功')">点我测试（onclick内联）</button>
<button class="btn" id="btn2">点我测试（addEventListener）</button>
<button class="btn" id="btn3" data-action="delegation">点我测试（event delegation）</button>
<div class="result" id="result">等待点击...</div>

<script>
// 无论以何种方式，只要JS能执行，这个计数器就会变
document.getElementById('result').innerHTML = '<span class="green">JS已执行</span> - 请点击上方按钮';

var count = 0;
function show(msg){
  count++;
  document.getElementById('result').innerHTML = '<span class="green">第'+count+'次点击:</span> '+msg;
}

document.getElementById('btn2').addEventListener('click', function(){
  show('addEventListener成功');
});

document.body.addEventListener('click', function(e){
  if(e.target.getAttribute('data-action')==='delegation'){
    show('event delegation成功');
  }
});
</script>
</body>
</html>
